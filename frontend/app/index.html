<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#003c60" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111316" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Rowan Rose / Fast Action Claims — track your claim, upload documents and review offers." />
    <title>Rowan Rose — Client Portal</title>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("rr-theme");
          var sys = matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = saved === "dark" || ((saved === "system" || !saved) && sys);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
