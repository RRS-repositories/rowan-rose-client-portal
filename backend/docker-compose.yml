# Local Postgres for the portal's auth/accounts. Host port 5433 to avoid the
# system Postgres 18 service already on 5432. Credentials are dev-only.
services:
  db:
    image: postgres:16-alpine
    container_name: rowan_portal_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rowan
      POSTGRES_PASSWORD: rowanpass
      POSTGRES_DB: rowan_portal
    ports:
      - "5433:5432"
    volumes:
      - rowan_portal_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rowan -d rowan_portal"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  rowan_portal_pgdata:
